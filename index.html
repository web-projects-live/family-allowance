<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Erickson Allowance</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#293548;--border:#334155;
  --text:#f8fafc;--text2:#94a3b8;
  --green:#10b981;--red:#f43f5e;--amber:#f59e0b;--blue:#3b82f6;
  --purple:#7c3aed;--pink:#db2777;--teal:#059669;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased}

/* ── LOGIN ── */
#login{min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:28px 24px;gap:20px}
.l-logo{font-size:52px;text-align:center;line-height:1}
.l-title{font-size:26px;font-weight:800;text-align:center;letter-spacing:-.5px}
.l-sub{font-size:14px;color:var(--text2);text-align:center;margin-top:-8px}
.l-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.l-field{display:flex;flex-direction:column;gap:6px}
.l-lbl{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.l-inp{background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;font-size:17px;color:var(--text);outline:none;
  transition:border-color .15s;font-family:inherit;width:100%}
.l-inp:focus{border-color:var(--blue)}
.l-inp.shake{animation:shk .3s}
@keyframes shk{0%,100%{transform:none}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.l-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;
  padding:15px;font-size:16px;font-weight:700;cursor:pointer;
  transition:opacity .15s;font-family:inherit;margin-top:4px}
.l-btn:disabled{opacity:.4;cursor:default}
.l-err{color:var(--red);text-align:center;font-size:13px;min-height:18px}
.l-forgot{background:none;border:none;color:var(--text2);font-size:13px;
  cursor:pointer;text-align:center;text-decoration:underline;font-family:inherit;padding:2px}

/* ── APP SHELL ── */
#app{max-width:480px;margin:0 auto;padding-bottom:64px}
header{background:var(--card);padding:11px 16px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10;
  border-bottom:1px solid var(--border);gap:8px}
.hdr-user{display:flex;align-items:center;gap:10px;min-width:0}
.hdr-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.hdr-nm{font-weight:600;font-size:15px;white-space:nowrap}
.week-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.week-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit}
.week-nav button:disabled{opacity:.3;cursor:default}
#week-lbl{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:56px;text-align:center}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-btn{background:none;border:1px solid var(--border);color:var(--text2);
  border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit}

/* ── REQUESTS BANNER ── */
#req-banner{margin:12px 16px 0;background:#f59e0b14;border:1px solid #f59e0b44;
  border-radius:12px;padding:11px 14px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer}
.rb-left{display:flex;align-items:center;gap:10px}
.rb-dot{background:var(--amber);color:#000;font-size:11px;font-weight:700;
  border-radius:99px;padding:2px 8px}
.rb-txt{font-size:14px;font-weight:500;color:var(--amber)}
.rb-chev{color:var(--amber);font-size:16px;transition:transform .2s}
.rb-chev.open{transform:rotate(180deg)}
#req-panel{margin:6px 16px 0;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden}
.req-item{padding:14px 16px;border-bottom:1px solid var(--border)}
.req-item:last-child{border-bottom:none}
.ri-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ri-child{font-weight:700;font-size:14px}
.ri-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.rb-chore_dispute{background:#3b82f620;color:#93c5fd;border:1px solid #3b82f640}
.rb-bonus_request{background:#10b98120;color:#6ee7b7;border:1px solid #10b98140}
.rb-purchase_request{background:#f59e0b20;color:#fcd34d;border:1px solid #f59e0b40}
.rb-other{background:#94a3b820;color:#cbd5e1;border:1px solid #94a3b840}
.ri-desc{font-size:14px;color:var(--text2);margin-bottom:4px}
.ri-amt{font-size:13px;color:var(--green);font-weight:600;margin-bottom:4px}
.ri-time{font-size:12px;color:var(--text2);margin-bottom:10px}
.ri-acts{display:flex;gap:8px}
.ri-approve{flex:1;background:#10b98118;border:1px solid #10b98155;color:var(--green);
  border-radius:8px;padding:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.ri-deny{flex:1;background:#f43f5e18;border:1px solid #f43f5e55;color:var(--red);
  border-radius:8px;padding:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* ── CHILD TABS (parents only) ── */
.child-tabs{display:flex;gap:8px;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.child-tab{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  color:var(--text2);font-family:inherit;transition:background .15s,color .15s}
.child-tab.active{background:color-mix(in srgb,var(--blue) 16%,var(--card));
  border-color:var(--blue);color:var(--text)}
.tab-bal{display:block;font-size:11px;font-weight:700;margin-top:1px}
.tab-pos{color:var(--green)}
.tab-neg{color:var(--red)}

/* ── CHILD CARD ── */
.child-card{margin:10px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.cc-hdr{padding:16px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
.cc-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:19px;font-weight:700}
.cc-sub{font-size:12px;color:var(--text2);margin-top:2px}
.cc-bal{text-align:right;flex-shrink:0}
.bal-amt{font-size:24px;font-weight:800;line-height:1}
.bal-pos{color:var(--green)}
.bal-neg{color:var(--red)}
.bal-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── CHORE GRID ── */
.grid-hdr{display:flex;align-items:center;padding:10px 18px 4px}
.grid-hdr-label{flex:1;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.grid-hdr-days{display:flex;gap:3px}
.day-col{width:33px;text-align:center;font-size:11px;font-weight:700;color:var(--text2)}
.day-col.today{color:var(--blue)}
.chore-rows{padding:0 18px 4px}
.chore-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.chore-row:last-child{border-bottom:none}
.chore-info{flex:1;min-width:0;padding-right:8px}
.chore-label{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chore-val{font-size:11px;color:var(--text2);margin-top:1px}
.chore-days{display:flex;gap:3px;flex-shrink:0}
.day-btn{width:33px;height:33px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .1s,color .1s,border-color .1s}
.day-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.day-btn.future{opacity:.3;cursor:default}
.day-btn.locked{opacity:.45;cursor:default}
.no-chores{padding:14px 18px;font-size:13px;color:var(--text2)}

/* ── EARN BAR ── */
.earn-bar{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.earn-txt{flex:1;min-width:0;font-size:13px;color:var(--text2)}
.earn-txt strong{color:var(--text)}
.btn-post{background:#10b98118;border:1px solid #10b98155;color:var(--green);
  border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}

/* ── BALANCE ACTIONS ── */
.bal-acts{padding:10px 18px 14px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn-add{flex:1;background:#10b98118;border:1px solid #10b98155;color:var(--green);border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-spend{flex:1;background:#f43f5e18;border:1px solid #f43f5e55;color:var(--red);border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-hist{background:var(--card2);border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:11px 14px;font-size:16px;cursor:pointer;font-family:inherit}

/* ── HISTORY ── */
.hist-section{border-top:1px solid var(--border)}
.hist-row{padding:10px 18px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}
.hist-row:last-child{border-bottom:none}
.hist-desc{flex:1;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-date{font-size:11px;color:var(--text2);margin:0 8px;white-space:nowrap}
.hist-amt{font-weight:700;white-space:nowrap}
.ha-pos{color:var(--green)}
.ha-neg{color:var(--red)}

/* ── KID SECTION ── */
.kid-actions{padding:16px}
.btn-kid-req{width:100%;background:#3b82f618;border:1px solid #3b82f655;color:var(--blue);
  border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.my-reqs{margin:0 16px;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.my-reqs-ttl{padding:12px 16px;font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.mr-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mr-item:last-child{border-bottom:none}
.mr-desc{font-size:14px}
.mr-note{font-size:12px;color:var(--text2);margin-top:3px}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap;text-transform:uppercase;flex-shrink:0}
.pill-pending{background:#f59e0b18;color:var(--amber);border:1px solid #f59e0b44}
.pill-approved{background:#10b98118;color:var(--green);border:1px solid #10b98144}
.pill-denied{background:#f43f5e18;color:var(--red);border:1px solid #f43f5e44}

/* ── MODALS ── */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;
  display:none;align-items:flex-end;justify-content:center}
.modal-bd.open{display:flex}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;
  padding:24px 20px calc(24px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;
  animation:shu .22s ease}
@keyframes shu{from{transform:translateY(100%)}to{transform:none}}
.modal-title{font-size:18px;font-weight:700;text-align:center}
.m-lbl{font-size:12px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.m-inp,.m-sel,.m-ta{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:16px;color:var(--text);width:100%;outline:none;font-family:inherit}
.m-inp:focus,.m-sel:focus,.m-ta:focus{border-color:var(--blue)}
.m-sel option{background:var(--card)}
.m-ta{min-height:76px;resize:none}
.modal-row{display:flex;gap:10px}
.btn-cancel{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ok{flex:2;border:none;color:#fff;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.ok-green{background:var(--green)}
.ok-red{background:var(--red)}
.ok-blue{background:var(--blue)}
.ok-purple{background:var(--purple)}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(80px);background:#1e293b;
  border:1px solid var(--border);color:var(--text);padding:12px 20px;
  border-radius:12px;font-size:14px;font-weight:500;transition:transform .28s;
  z-index:200;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login">
  <div>
    <div class="l-logo">💰</div>
    <div class="l-title">Erickson Allowance</div>
    <div class="l-sub">Sign in to manage chores &amp; spending</div>
  </div>
  <div class="l-form">
    <div class="l-field">
      <label class="l-lbl" for="l-email">Email</label>
      <input id="l-email" class="l-inp" type="email" inputmode="email"
        autocomplete="email" placeholder="your@email.com"
        onkeydown="if(event.key==='Enter')document.getElementById('l-pw').focus()">
    </div>
    <div class="l-field">
      <label class="l-lbl" for="l-pw">Password</label>
      <input id="l-pw" class="l-inp" type="password"
        autocomplete="current-password" placeholder="Password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="l-err" id="l-err"></div>
    <button class="l-btn" id="l-btn" onclick="doLogin()">Sign In →</button>
    <button class="l-forgot" onclick="doForgot()">Forgot password?</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">
  <header>
    <div class="hdr-user">
      <div class="hdr-av" id="hdr-av"></div>
      <span class="hdr-nm" id="hdr-nm"></span>
    </div>
    <div class="week-nav">
      <button onclick="shiftWeek(-1)">‹</button>
      <span id="week-lbl"></span>
      <button id="btn-next-wk" onclick="shiftWeek(1)" disabled>›</button>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="openPwModal()" title="Change password">🔑</button>
      <button class="hdr-btn" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <!-- Pending requests banner (parents only) -->
  <div id="req-banner" style="display:none" onclick="toggleReqPanel()">
    <div class="rb-left">
      <span class="rb-dot" id="rb-dot"></span>
      <span class="rb-txt" id="rb-txt"></span>
    </div>
    <span class="rb-chev" id="rb-chev">▾</span>
  </div>
  <div id="req-panel" style="display:none"><div id="req-list"></div></div>

  <!-- Child tabs (parents only) -->
  <div id="child-tabs-wrap" style="display:none">
    <div class="child-tabs" id="child-tabs"></div>
  </div>

  <!-- Active child card -->
  <div id="child-card-wrap"></div>

  <!-- Kid: my requests -->
  <div id="kid-section" style="display:none">
    <div class="kid-actions">
      <button class="btn-kid-req" onclick="openReqModal()">+ Send a Request to Parents</button>
    </div>
    <div id="my-reqs-wrap" style="display:none">
      <div class="my-reqs">
        <div class="my-reqs-ttl">My Requests</div>
        <div id="my-reqs-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Funds -->
<div class="modal-bd" id="add-modal" onclick="if(event.target===this)closeAdd()">
  <div class="modal-sheet">
    <div class="modal-title">Add Funds</div>
    <div><div class="m-lbl">Child</div><select class="m-sel" id="add-child"></select></div>
    <div><div class="m-lbl">Amount ($)</div>
      <input type="number" class="m-inp" id="add-amt" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal"></div>
    <div><div class="m-lbl">Reason</div>
      <input type="text" class="m-inp" id="add-desc" placeholder="Birthday money, bonus, gift…"></div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
      <button class="btn-ok ok-green" onclick="confirmAdd()">+ Add</button>
    </div>
  </div>
</div>

<!-- Log Spend -->
<div class="modal-bd" id="spend-modal" onclick="if(event.target===this)closeSpend()">
  <div class="modal-sheet">
    <div class="modal-title">Log a Purchase</div>
    <div><div class="m-lbl">Child</div><select class="m-sel" id="sp-child"></select></div>
    <div><div class="m-lbl">Amount ($)</div>
      <input type="number" class="m-inp" id="sp-amt" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal"></div>
    <div><div class="m-lbl">What did they buy?</div>
      <input type="text" class="m-inp" id="sp-desc" placeholder="Roblox, snack, toy…"></div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeSpend()">Cancel</button>
      <button class="btn-ok ok-red" onclick="confirmSpend()">− Deduct</button>
    </div>
  </div>
</div>

<!-- Kid Request -->
<div class="modal-bd" id="req-modal" onclick="if(event.target===this)closeReqModal()">
  <div class="modal-sheet">
    <div class="modal-title">Send a Request</div>
    <div><div class="m-lbl">Type</div>
      <select class="m-sel" id="rq-type" onchange="onRqTypeChange()">
        <option value="bonus_request">Extra Earning / Bonus</option>
        <option value="purchase_request">Permission to Buy Something</option>
        <option value="chore_dispute">Chore Not Marked Done</option>
        <option value="other">Other / Question</option>
      </select></div>
    <div><div class="m-lbl">Details</div>
      <textarea class="m-ta" id="rq-desc" placeholder="Tell your parents what you need…"></textarea></div>
    <div id="rq-amt-wrap">
      <div class="m-lbl">Dollar amount (optional)</div>
      <input type="number" class="m-inp" id="rq-amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeReqModal()">Cancel</button>
      <button class="btn-ok ok-blue" onclick="submitReq()">Send →</button>
    </div>
  </div>
</div>

<!-- Change Password -->
<div class="modal-bd" id="pw-modal" onclick="if(event.target===this)closePwModal()">
  <div class="modal-sheet">
    <div class="modal-title">Change Password</div>
    <div><div class="m-lbl">New Password</div>
      <input type="password" class="m-inp" id="new-pw" placeholder="At least 6 characters"
        autocomplete="new-password"></div>
    <div><div class="m-lbl">Confirm Password</div>
      <input type="password" class="m-inp" id="confirm-pw" placeholder="Repeat password"
        autocomplete="new-password"></div>
    <div class="l-err" id="pw-err"></div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closePwModal()">Cancel</button>
      <button class="btn-ok ok-purple" onclick="confirmPwChange()">Update Password</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

  'kayla.s.erickson@gmail.com': { name:'Kayla', role:'parent', color:'#db2777' },
  'aaron.g.erickson@gmail.com': { name:'Aaron', role:'kid', child:'Aaron', color:'#2563eb' },
  'davin.c.erickson@gmail.com': { name:'Davin', role:'kid', child:'Davin', color:'#059669' },
};
const COLORS = { Joel:'#7c3aed', Kayla:'#db2777', Aaron:'#2563eb', Davin:'#059669' };
const DAY_LETTERS = ['M','T','W','T','F','S','S'];

let me = null, weekOff = 0, activeChild = null;
let kids = [], txns = [], weeks = [], reqs = [], reqPanelOpen = false, histOpen = {};

/* ── Week key: Monday-date format, matches kiosk dashboard ── */
function weekKey(off = 0) {
  const d = new Date(), day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((day + 6) % 7) + off * 7);
  mon.setHours(0, 0, 0, 0);
  return mon.toISOString().split('T')[0];
}
function weekRange(off = 0) {
  const wk = weekKey(off), mon = new Date(wk), sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const f = d => d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  return `${f(mon)} – ${f(sun)}`;
}
function shiftWeek(n) {
  weekOff += n;
  document.getElementById('btn-next-wk').disabled = weekOff >= 0;
  loadData();
}

/* ── Auth ── */
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { resolveMe(session.user); enterApp(); }
  else showLogin();
  // Handle password reset links (email link lands with #access_token)
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') openPwModal();
  });
}

function resolveMe(user) {
  const meta = user.user_metadata || {};
  const fallback = EMAIL_PEOPLE[user.email] || {};
  me = {
    name:  meta.name  || fallback.name  || user.email.split('@')[0],
    role:  meta.role  || fallback.role  || 'kid',
    child: meta.child || fallback.child || null,
    color: COLORS[meta.name] || fallback.color || '#64748b',
    email: user.email,
  };
}

function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pw = document.getElementById('l-pw').value;
  const btn = document.getElementById('l-btn');
  document.getElementById('l-err').textContent = '';
  if (!email || !pw) { document.getElementById('l-err').textContent = 'Enter your email and password'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Sign In →';
  if (error) {
    const inp = document.getElementById('l-pw');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 320);
    document.getElementById('l-err').textContent = 'Incorrect email or password';
    inp.value = ''; return;
  }
  resolveMe(data.user);
  enterApp();
}

async function doForgot() {
  const email = document.getElementById('l-email').value.trim();
  if (!email) { document.getElementById('l-err').textContent = 'Enter your email address first'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.href,
  });
  if (error) { document.getElementById('l-err').textContent = error.message; }
  else { document.getElementById('l-err').style.color = 'var(--green)'; document.getElementById('l-err').textContent = 'Check your email for a reset link ✓'; }
}

async function doLogout() {
  await sb.auth.signOut();
  me = null; weekOff = 0; activeChild = null; histOpen = {};
  document.getElementById('l-email').value = '';
  document.getElementById('l-pw').value = '';
  document.getElementById('l-err').textContent = '';
  document.getElementById('l-err').style.color = '';
  showLogin();
}

function enterApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const av = document.getElementById('hdr-av');
  av.textContent = me.name[0]; av.style.background = me.color;
  document.getElementById('hdr-nm').textContent = me.name;
  const isParent = me.role === 'parent';
  document.getElementById('child-tabs-wrap').style.display = isParent ? 'block' : 'none';
  document.getElementById('kid-section').style.display = isParent ? 'none' : 'block';
  if (!isParent) activeChild = me.child;
  loadData();
}

/* ── Data ── */
async function loadData() {
  const wk = weekKey(weekOff);
  const lbl = document.getElementById('week-lbl');
  lbl.textContent = weekOff === 0 ? 'This Wk' : weekOff === -1 ? 'Last Wk' : weekRange(weekOff);

  const [{ data: ch }, { data: tx }, { data: wkd }, { data: rq }] = await Promise.all([
    sb.from('allowance_children').select('*').order('name'),
    sb.from('allowance_transactions').select('*').order('created_at', { ascending: false }),
    sb.from('allowance_weeks').select('*').eq('week_key', wk),
    sb.from('allowance_requests').select('*').order('created_at', { ascending: false }),
  ]);
  kids = ch || []; txns = tx || []; weeks = wkd || []; reqs = rq || [];

  const isParent = me?.role === 'parent';
  if (isParent && !activeChild && kids.length) activeChild = kids[0].name;
  render();
}

/* ── Helpers ── */
function choreDays(v) { return Array.isArray(v) ? v : (v === true ? [0] : []); }
function weekEarned(child, wd) {
  return (child.chores || []).reduce((sum, ch) =>
    sum + choreDays(wd.completions?.[ch.id]).length * (parseFloat(ch.value) || 0), 0);
}
function getBalance(name) {
  return txns.filter(t => t.child_name === name).reduce((s, t) => s + parseFloat(t.amount || 0), 0);
}
function getWeekData(name) {
  return weeks.find(w => w.child_name === name) || { completions: {} };
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtD(iso) { return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
function ago(iso) {
  const d = Date.now() - new Date(iso);
  if (d < 60000) return 'just now';
  if (d < 3600000) return `${Math.floor(d/60000)}m ago`;
  if (d < 86400000) return `${Math.floor(d/3600000)}h ago`;
  return `${Math.floor(d/86400000)}d ago`;
}

/* ── Render ── */
function render() {
  renderReqs();
  if (me?.role === 'parent') renderTabs();
  renderChildCard();
  if (me?.role === 'kid') renderMyReqs();
}

function renderReqs() {
  if (me?.role !== 'parent') return;
  const pend = reqs.filter(r => r.status === 'pending');
  const banner = document.getElementById('req-banner');
  if (!pend.length) { banner.style.display = 'none'; document.getElementById('req-panel').style.display = 'none'; reqPanelOpen = false; return; }
  banner.style.display = 'flex';
  document.getElementById('rb-dot').textContent = pend.length;
  document.getElementById('rb-txt').textContent = `${pend.length} pending request${pend.length > 1 ? 's' : ''}`;
  document.getElementById('req-list').innerHTML = pend.map(r => `
    <div class="req-item">
      <div class="ri-hdr">
        <span class="ri-child">${esc(r.child_name)}</span>
        <span class="ri-badge rb-${r.type}">${r.type.replace(/_/g,' ')}</span>
      </div>
      <div class="ri-desc">${esc(r.description)}</div>
      ${r.amount ? `<div class="ri-amt">Requesting $${(+r.amount).toFixed(2)}</div>` : ''}
      <div class="ri-time">${ago(r.created_at)}</div>
      <div class="ri-acts">
        <button class="ri-approve" onclick="reviewReq('${r.id}','approved',${r.amount||0},'${esc(r.child_name)}','${r.type}')">✓ Approve</button>
        <button class="ri-deny" onclick="reviewReq('${r.id}','denied',0,'','')">✗ Deny</button>
      </div>
    </div>`).join('');
}

function toggleReqPanel() {
  reqPanelOpen = !reqPanelOpen;
  document.getElementById('req-panel').style.display = reqPanelOpen ? 'block' : 'none';
  document.getElementById('rb-chev').classList.toggle('open', reqPanelOpen);
}

function renderTabs() {
  document.getElementById('child-tabs').innerHTML = kids.map(child => {
    const bal = getBalance(child.name);
    const pos = bal >= 0;
    return `<button class="child-tab${child.name === activeChild ? ' active' : ''}" onclick="setActive('${child.name}')">
      ${child.name}
      <span class="tab-bal ${pos ? 'tab-pos' : 'tab-neg'}">${pos?'':'-'}$${Math.abs(bal).toFixed(2)}</span>
    </button>`;
  }).join('');
}

function setActive(name) { activeChild = name; renderTabs(); renderChildCard(); }

function renderChildCard() {
  const wrap = document.getElementById('child-card-wrap');
  const child = kids.find(k => k.name === activeChild);
  if (!child) { wrap.innerHTML = ''; return; }

  const wd = getWeekData(child.name);
  const chores = child.chores || [];
  const bal = getBalance(child.name);
  const earned = weekEarned(child, wd);
  const posted = parseFloat(wd.posted_amount) || 0;
  const unposted = Math.max(0, earned - posted);
  const isPast = weekOff < 0;
  const todayIdx = (new Date().getDay() + 6) % 7;
  const isParent = me?.role === 'parent';
  const isMyCard = me?.child === child.name;
  const canToggle = isParent || isMyCard;
  const color = COLORS[child.name] || '#64748b';

  const totalDone = chores.reduce((n, ch) => n + choreDays(wd.completions?.[ch.id]).length, 0);

  const dayHdrs = DAY_LETTERS.map((l, i) =>
    `<div class="day-col${!isPast && i === todayIdx ? ' today' : ''}">${l}</div>`).join('');

  const choreRowsHtml = chores.length ? chores.map(ch => {
    const days = choreDays(wd.completions?.[ch.id]);
    const btns = DAY_LETTERS.map((l, i) => {
      const done = days.includes(i);
      let cls = 'day-btn' + (done ? ' done' : '');
      const tappable = canToggle && !isPast && i <= todayIdx;
      if (isPast) cls += ' locked';
      else if (i > todayIdx) cls += ' future';
      return `<button class="${cls}" ${tappable ? `onclick="toggleChoreDay('${child.name}','${ch.id}',${i})"` : 'disabled'}>${done ? '✓' : l}</button>`;
    }).join('');
    return `<div class="chore-row">
      <div class="chore-info">
        <div class="chore-label">${esc(ch.label)}</div>
        <div class="chore-val">$${(parseFloat(ch.value)||0).toFixed(2)} each</div>
      </div>
      <div class="chore-days">${btns}</div>
    </div>`;
  }).join('') : '<div class="no-chores">No chores set up yet — add them on the home screen</div>';

  const tx10 = txns.filter(t => t.child_name === child.name).slice(0, 10);
  const histHtml = tx10.length ? `
    <div class="hist-section" id="hist-${child.name}" style="display:${histOpen[child.name]?'block':'none'}">
      ${tx10.map(t => {
        const pos = parseFloat(t.amount) >= 0;
        return `<div class="hist-row">
          <span class="hist-desc">${esc(t.description || t.type)}</span>
          <span class="hist-date">${fmtD(t.created_at)}</span>
          <span class="hist-amt ${pos?'ha-pos':'ha-neg'}">${pos?'+':'−'}$${Math.abs(parseFloat(t.amount)).toFixed(2)}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  wrap.innerHTML = `<div class="child-card">
    <div class="cc-hdr">
      <div class="cc-av" style="background:${color}">${child.name[0]}</div>
      <div class="cc-info">
        <div class="cc-name">${child.name}</div>
        <div class="cc-sub">${chores.length} chore${chores.length!==1?'s':''} · $${(parseFloat(child.weekly_base)||0).toFixed(2)}/wk base</div>
      </div>
      <div class="cc-bal">
        <div class="bal-amt ${bal>=0?'bal-pos':'bal-neg'}">${bal<0?'−':''}$${Math.abs(bal).toFixed(2)}</div>
        <div class="bal-lbl">Balance</div>
      </div>
    </div>

    <div class="grid-hdr">
      <div class="grid-hdr-label">${totalDone} completion${totalDone!==1?'s':''} this week</div>
      <div class="grid-hdr-days">${dayHdrs}</div>
    </div>
    <div class="chore-rows">${choreRowsHtml}</div>

    <div class="earn-bar">
      <div class="earn-txt">Earned <strong>$${earned.toFixed(2)}</strong> this week${posted>0?` · $${posted.toFixed(2)} paid out`:''}</div>
      ${isParent && !isPast && unposted > 0.004
        ? `<button class="btn-post" onclick="postEarning('${child.name}')">+ Post $${unposted.toFixed(2)}</button>` : ''}
    </div>

    ${isParent ? `<div class="bal-acts">
      <button class="btn-add" onclick="openAdd('${child.name}')">+ Add Funds</button>
      <button class="btn-spend" onclick="openSpend('${child.name}')">− Log Spend</button>
      <button class="btn-hist" onclick="toggleHist('${child.name}')" title="Transaction history">≡</button>
    </div>` : ''}

    ${histHtml}
  </div>`;
}

function renderMyReqs() {
  if (!me?.child) return;
  const mine = reqs.filter(r => r.child_name === me.child);
  const wrap = document.getElementById('my-reqs-wrap');
  if (!mine.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('my-reqs-list').innerHTML = mine.slice(0, 8).map(r => `
    <div class="mr-item">
      <div>
        <div class="mr-desc">${esc(r.description)}</div>
        ${r.parent_note ? `<div class="mr-note">👋 "${esc(r.parent_note)}"</div>` : ''}
        <div class="mr-note">${ago(r.created_at)}</div>
      </div>
      <span class="pill pill-${r.status}">${r.status}</span>
    </div>`).join('');
}

/* ── Chore Toggle ── */
async function toggleChoreDay(childName, choreId, dayIdx) {
  const wk = weekKey(weekOff);
  const wd = getWeekData(childName);
  const completions = { ...(wd.completions || {}) };
  const days = choreDays(completions[choreId]);
  completions[choreId] = days.includes(dayIdx)
    ? days.filter(d => d !== dayIdx)
    : [...days, dayIdx].sort((a,b)=>a-b);

  // Optimistic
  const existing = weeks.find(w => w.child_name === childName);
  if (existing) Object.assign(existing, { completions });
  else weeks.push({ child_name: childName, week_key: wk, completions, posted_amount: 0 });
  renderChildCard();

  // Persist
  if (existing) {
    await sb.from('allowance_weeks').update({ completions }).eq('child_name', childName).eq('week_key', wk);
  } else {
    await sb.from('allowance_weeks').insert({ child_name: childName, week_key: wk, completions, earning_posted: false, posted_amount: 0 });
  }
}

/* ── Post Earnings ── */
async function postEarning(childName) {
  const child = kids.find(k => k.name === childName); if (!child) return;
  const wk = weekKey(weekOff);
  const wd = getWeekData(childName);
  const earned = weekEarned(child, wd);
  const posted = parseFloat(wd.posted_amount) || 0;
  const unposted = Math.max(0, earned - posted);
  if (unposted < 0.005) { toast('Nothing new to post'); return; }
  const newPosted = posted + unposted;
  await sb.from('allowance_transactions').insert({
    child_name: childName, type: 'earning', amount: unposted,
    description: `Chore earnings — week of ${wk}`, week_key: wk,
  });
  const existing = weeks.find(w => w.child_name === childName);
  if (existing) {
    await sb.from('allowance_weeks').update({ posted_amount: newPosted, earning_posted: true }).eq('child_name', childName).eq('week_key', wk);
  } else {
    await sb.from('allowance_weeks').insert({ child_name: childName, week_key: wk, completions: {}, posted_amount: newPosted, earning_posted: true });
  }
  toast(`✓ $${unposted.toFixed(2)} posted for ${childName}`);
  await loadData();
}

/* ── Add Funds ── */
function openAdd(name) {
  document.getElementById('add-child').innerHTML = kids.map(k =>
    `<option value="${k.name}"${k.name===name?' selected':''}>${k.name}</option>`).join('');
  document.getElementById('add-amt').value = '';
  document.getElementById('add-desc').value = '';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('add-amt').focus(), 120);
}
function closeAdd() { document.getElementById('add-modal').classList.remove('open'); }
async function confirmAdd() {
  const child = document.getElementById('add-child').value;
  const amt = parseFloat(document.getElementById('add-amt').value);
  const desc = document.getElementById('add-desc').value.trim();
  if (!amt || amt <= 0) { toast('Enter a valid amount'); return; }
  if (!desc) { toast('Add a reason'); return; }
  await sb.from('allowance_transactions').insert({ child_name: child, type: 'adjustment', amount: amt, description: desc, week_key: weekKey(weekOff) });
  closeAdd();
  toast(`+$${amt.toFixed(2)} added for ${child} ✓`);
  await loadData();
}

/* ── Log Spend ── */
function openSpend(name) {
  document.getElementById('sp-child').innerHTML = kids.map(k =>
    `<option value="${k.name}"${k.name===name?' selected':''}>${k.name}</option>`).join('');
  document.getElementById('sp-amt').value = '';
  document.getElementById('sp-desc').value = '';
  document.getElementById('spend-modal').classList.add('open');
  setTimeout(() => document.getElementById('sp-amt').focus(), 120);
}
function closeSpend() { document.getElementById('spend-modal').classList.remove('open'); }
async function confirmSpend() {
  const child = document.getElementById('sp-child').value;
  const amt = parseFloat(document.getElementById('sp-amt').value);
  const desc = document.getElementById('sp-desc').value.trim();
  if (!amt || amt <= 0) { toast('Enter a valid amount'); return; }
  if (!desc) { toast('Add a description'); return; }
  await sb.from('allowance_transactions').insert({ child_name: child, type: 'purchase', amount: -amt, description: desc, week_key: weekKey(weekOff) });
  closeSpend();
  toast(`−$${amt.toFixed(2)} logged for ${child}`);
  await loadData();
}

/* ── Kid Requests ── */
function openReqModal() {
  document.getElementById('rq-type').value = 'bonus_request';
  document.getElementById('rq-desc').value = '';
  document.getElementById('rq-amt').value = '';
  onRqTypeChange();
  document.getElementById('req-modal').classList.add('open');
  setTimeout(() => document.getElementById('rq-desc').focus(), 120);
}
function closeReqModal() { document.getElementById('req-modal').classList.remove('open'); }
function onRqTypeChange() {
  const t = document.getElementById('rq-type').value;
  document.getElementById('rq-amt-wrap').style.display = (t==='bonus_request'||t==='purchase_request') ? 'block' : 'none';
}
async function submitReq() {
  const childName = me?.child; if (!childName) return;
  const type = document.getElementById('rq-type').value;
  const desc = document.getElementById('rq-desc').value.trim();
  const amt = parseFloat(document.getElementById('rq-amt').value) || null;
  if (!desc) { toast('Describe your request first'); return; }
  await sb.from('allowance_requests').insert({ child_name: childName, type, description: desc, amount: amt });
  closeReqModal();
  toast('Request sent! 📬');
  await loadData();
}

async function reviewReq(id, status, amount, childName, type) {
  await sb.from('allowance_requests').update({ status, reviewed_at: new Date().toISOString() }).eq('id', id);
  if (status === 'approved' && +amount > 0 && childName) {
    await sb.from('allowance_transactions').insert({
      child_name: childName, type: 'adjustment', amount: +amount,
      description: `Approved: ${type.replace(/_/g,' ')}`, week_key: weekKey(weekOff),
    });
  }
  toast(status === 'approved' ? '✓ Approved!' : 'Denied');
  await loadData();
}

/* ── Change Password ── */
function openPwModal() {
  document.getElementById('new-pw').value = '';
  document.getElementById('confirm-pw').value = '';
  document.getElementById('pw-err').textContent = '';
  document.getElementById('pw-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-pw').focus(), 120);
}
function closePwModal() { document.getElementById('pw-modal').classList.remove('open'); }
async function confirmPwChange() {
  const np = document.getElementById('new-pw').value;
  const cp = document.getElementById('confirm-pw').value;
  const errEl = document.getElementById('pw-err');
  if (np.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
  if (np !== cp) { errEl.textContent = 'Passwords do not match'; return; }
  const { error } = await sb.auth.updateUser({ password: np });
  if (error) { errEl.textContent = error.message; return; }
  closePwModal();
  toast('Password updated ✓');
}

/* ── History toggle ── */
function toggleHist(name) {
  histOpen[name] = !histOpen[name];
  const el = document.getElementById('hist-' + name);
  if (el) el.style.display = histOpen[name] ? 'block' : 'none';
}

/* ── Toast ── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

init();
</script>
